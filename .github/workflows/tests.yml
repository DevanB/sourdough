name: tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: 8.5
          tools: composer:v2
          coverage: pcov
          ini-values: zend.assertions=1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 24
          # This project installs JS deps with Bun (see the "Install Bun
          # Dependencies" step). Let setup-vp run its own npm install and it
          # clobbers Bun's node_modules with an inconsistent tree.
          run-install: false

      - name: Cache Composer Dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache Bun Dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Install Bun Dependencies
        run: bun install

      - name: Build Assets
        run: bun run build

      - name: Assert Client and SSR Build Artifacts
        run: |
          test -f public/build/manifest.json
          test -f bootstrap/ssr/app.js

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun pm ls 2>/dev/null | grep playwright | head -1 | sed 's/.*@//')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps

      - name: Verify Production SSR Hydration
        run: |
          set -euo pipefail

          cleanup() {
            php artisan inertia:stop-ssr >/dev/null 2>&1 || true
            if [ -n "${LARAVEL_PID:-}" ] && kill -0 "$LARAVEL_PID" 2>/dev/null; then
              kill "$LARAVEL_PID" >/dev/null 2>&1 || true
              wait "$LARAVEL_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          php artisan inertia:start-ssr --runtime=node &
          SSR_PID=$!

          for i in $(seq 1 30); do
            if php artisan inertia:check-ssr >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 "$SSR_PID" 2>/dev/null; then
              echo "SSR process exited before becoming healthy"
              exit 1
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for inertia:check-ssr"
              exit 1
            fi
          done

          # --no-reload is required so SESSION_DRIVER/CACHE_STORE/INERTIA_* env
          # overrides are passed through to the PHP built-in server process.
          SESSION_DRIVER=array CACHE_STORE=array INERTIA_SSR_THROW_ON_ERROR=true \
            php artisan serve --host=127.0.0.1 --port=8000 --no-reload >/tmp/laravel-ssr-serve.log 2>&1 &
          LARAVEL_PID=$!

          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "http://127.0.0.1:8000/" || echo '000')
            if [ "$code" = "200" ]; then
              break
            fi
            if ! kill -0 "$LARAVEL_PID" 2>/dev/null; then
              echo "Laravel server exited before becoming ready"
              cat /tmp/laravel-ssr-serve.log || true
              exit 1
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for Laravel server (last HTTP $code)"
              cat /tmp/laravel-ssr-serve.log || true
              exit 1
            fi
          done

          node --input-type=module <<'EOF'
          import { chromium } from 'playwright';

          const browser = await chromium.launch();
          const page = await browser.newPage();
          const pageErrors = [];
          const consoleErrors = [];

          page.on('pageerror', (error) => pageErrors.push(String(error)));
          page.on('console', (msg) => {
            if (msg.type() === 'error') {
              consoleErrors.push(msg.text());
            }
          });

          const response = await page.goto('http://127.0.0.1:8000/', {
            waitUntil: 'networkidle',
          });

          if (!response || response.status() !== 200) {
            throw new Error(`Expected HTTP 200, got ${response?.status()}`);
          }

          const serverRendered = await page.locator('[data-server-rendered="true"]').count();
          if (serverRendered < 1) {
            throw new Error('Expected data-server-rendered="true" on the page');
          }

          const bodyText = await page.locator('body').innerText();
          if (!bodyText.includes('Laravel')) {
            throw new Error('Expected visible page content containing "Laravel"');
          }

          if (pageErrors.length > 0 || consoleErrors.length > 0) {
            throw new Error(
              `Expected zero page/console errors.\nPage errors: ${JSON.stringify(pageErrors)}\nConsole errors: ${JSON.stringify(consoleErrors)}`,
            );
          }

          await browser.close();
          EOF

      - name: Cache Rector
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/rector
          key: ${{ runner.os }}-rector-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-rector-

      - name: Cache PHPStan
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: /tmp/phpstan
          key: ${{ runner.os }}-phpstan-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-phpstan-

      - name: Create Cache Directories
        run: mkdir -p /tmp/rector /tmp/phpstan

      - name: Tests
        run: composer test

      - name: Store Artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-screenshots
          path: tests/Browser/Screenshots
