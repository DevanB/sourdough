version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "php"
    assignees:
      - "DevanB"
    groups:
      composer-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      composer-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"

  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
    assignees:
      - "DevanB"
    groups:
      bun-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      bun-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
    ignore:
      # Pinned to the `latest` dist-tag / npm alias; version bumps are meaningless.
      - dependency-name: "vite"
      - dependency-name: "vite-plus"
      # Platform-specific prebuilt binaries resolved transitively per-platform.
      - dependency-name: "@rollup/rollup-linux-x64-gnu"
      - dependency-name: "lightningcss-linux-x64-gnu"
      - dependency-name: "@tailwindcss/oxide-linux-x64-gnu"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    assignees:
      - "DevanB"
    groups:
      github-actions-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      github-actions-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
